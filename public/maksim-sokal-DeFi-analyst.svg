<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep DeFi Protocol Blue to Crypto Green -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0D18" />
      <stop offset="50%" stop-color="#1B1938" />
      <stop offset="100%" stop-color="#00C9A7" />
    </linearGradient>

    <!-- Candlestick Trend Gradient -->
    <linearGradient id="trendGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#00FFCC" />
      <stop offset="100%" stop-color="#007ACC" />
    </linearGradient>

    <!-- Glow & Shadow Effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Node Connector Ring Style -->
    <style>
      .bg-circle { fill: url(#bgGrad); }
      .crypto-nodes { fill: none; stroke: #00FFCC; stroke-width: 6; stroke-dasharray: 16, 8; }
      .trend-bar { fill: url(#trendGrad); }
      .trend-wick { stroke: #FFFFFF; stroke-width: 8; stroke-linecap: round; }
      .hub-node { fill: #FFFFFF; filter: drop-shadow(0px 0px 14px #00FFCC); }
    </style>
  </defs>

  <!-- Base Favicon Square/Circle -->
  <rect width="512" height="512" rx="112" class="bg-circle" />

  <!-- Decentralized Network Nodes -->
  <g filter="url(#glow)">
    <circle cx="256" cy="256" r="150" class="crypto-nodes" />
    <line x1="256" y1="106" x2="256" y2="406" class="crypto-nodes" opacity="0.3" />
    <line x1="106" y1="256" x2="406" y2="256" class="crypto-nodes" opacity="0.3" />
  </g>

  <!-- DeFi Analyst Candlestick (Analytics) -->
  <g>
    <!-- Upper and Lower Wicks -->
    <line x1="256" y1="130" x2="256" y2="190" class="trend-wick" />
    <line x1="256" y1="322" x2="256" y2="382" class="trend-wick" />
    
    <!-- Candlestick Body -->
    <rect x="216" y="190" width="80" height="132" rx="12" class="trend-bar" />
  </g>

  <!-- Central Hub Node (Analytic Focus) -->
  <circle cx="256" cy="256" r="24" class="hub-node" />
  <circle cx="256" cy="256" r="10" fill="#0E0D18" />
</svg>
